<div class="container">
  <!-- Back + Title -->
  <div class="title">
    <img width="40" height="40"
      src="https://img.icons8.com/external-flaticons-lineal-color-flat-icons/64/external-arrow-left-web-flaticons-lineal-color-flat-icons-2.png"
      alt="back"
      style="cursor:pointer; filter:brightness(0) invert(1); opacity:.7;"
      (click)="back()" />
    <h1>Financial Detail</h1>
  </div>

  <!-- Info Topic -->
  <div class="infoTopic">
    <input type="text" class="input-infoTopic" [(ngModel)]="data.infoTopic" />
  </div>

  <!-- Salary / Use / Balance -->
  <div class="salary-container">
    <p style="font-size:14px; font-weight:700; color:#a8c4eb;">💵 Salary</p>
    <input type="number" class="salary-value" [(ngModel)]="data.salary" [disabled]="!_isEdit_Salary" />
    <button class="button-23" type="button" (click)="editSalary()" style="min-width:44px;">✏️</button>
    <button class="button-24" type="button" (click)="saveSalary()" style="min-width:44px;">💾</button>

    <p style="font-size:14px; font-weight:700; color:#e74c3c;">📉 Use</p>
    <input type="number" class="salary-value" [(ngModel)]="data.use" disabled />

    <p style="font-size:14px; font-weight:700; color:#f39c12;">💰 Balance</p>
    <input type="number" class="salary-value" [(ngModel)]="data.balance" disabled />
  </div>

  <!-- Type Summary Table -->
  <div class="type-container">
    <table class="fl-table">
      <thead>
        <tr>
          <th>Type</th>
          <th>Value (฿)</th>
          <th>Use (฿)</th>
          <th>Balance (฿)</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of data.financialTypeList">
          <td>{{ item.type }}</td>
          <td>{{ item.value }} ({{ item.percent }}%)</td>
          <td>{{ item.use }}</td>
          <td>{{ item.balance }}</td>
        </tr>
        <tr *ngIf="data.financialTypeList.length <= 0">
          <td colspan="4" style="text-align:center; color:#a8c4eb; padding:20px;">No data</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Add Button -->
  <div class="add-container">
    <button class="button-25" type="button" (click)="add()" style="min-width:120px;">+ Add Item</button>
  </div>

  <!-- Detail Table -->
  <div class="detail-container">
    <table class="detail-table">
      <thead>
        <tr>
          <th style="width:180px;"></th>
          <th>Category</th>
          <th>Topic</th>
          <th>Amount (฿)</th>
          <th>Already Paid</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of data.financialDetailList">
          <td style="display:flex; gap:8px; justify-content:center; align-items:center;">
            <button class="button-23" type="button" (click)="editDetail(item)" *ngIf="!item._IsEdit" style="min-width:44px;">✏️</button>
            <button class="button-26" type="button" (click)="remove(item)" *ngIf="!item._IsEdit" style="min-width:44px;">🗑️</button>
            <button class="button-24" type="button" (click)="saveChangeDetail(item)" *ngIf="item._IsEdit" style="min-width:44px;">💾</button>
            <button class="button-25" type="button" (click)="reserveBtn(item)" *ngIf="item._IsEdit" style="min-width:44px;">↩️</button>
          </td>
          <td>
            <select [(ngModel)]="item.typeId" [disabled]="!item._IsEdit"
              style="background:#1a2f55; border:1px solid #244a8a; border-radius:6px; color:#ffffff; padding:5px 8px; font-size:13px; outline:none; width:100%;">
              <option *ngFor="let type_item of data.financialTypeList" [value]="type_item.typeId">
                {{ type_item.type }}
              </option>
            </select>
          </td>
          <td>
            <input type="text" class="input-detail" [(ngModel)]="item.topic" [disabled]="!item._IsEdit" />
          </td>
          <td>
            <input type="number" class="input-detail" [(ngModel)]="item.amount" [disabled]="!item._IsEdit" />
          </td>
          <td style="text-align:center;">
            <div class="checkbox-wrapper-18">
              <div class="round">
                <input type="checkbox" [(ngModel)]="item.alreadyPaid" [id]="'chk-' + item.id" />
                <label [for]="'chk-' + item.id"></label>
              </div>
            </div>
          </td>
        </tr>
        <tr *ngIf="data.financialDetailList.length <= 0">
          <td colspan="5" style="text-align:center; color:#a8c4eb; padding:40px;">No data</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Bottom Actions -->
  <div class="bottom-container">
    <button class="button-23" type="button" (click)="cal()" style="min-width:120px;">🧮 Calculate</button>
    <button class="button-24" type="button" (click)="save()" style="min-width:120px;">💾 Save</button>
  </div>
</div>
